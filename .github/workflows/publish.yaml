name: Publish

on:
  push:
    branches:
      - main

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.version.outputs.should_publish }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check package version change
        id: version
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          BEFORE_SHA="${{ github.event.before }}"
          PREVIOUS_VERSION=""

          if [[ -n "${BEFORE_SHA}" ]] && [[ "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]] && git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            if git cat-file -e "${BEFORE_SHA}:package.json" 2>/dev/null; then
              PREVIOUS_VERSION="$(git show "${BEFORE_SHA}:package.json" | node -e "let data=''; process.stdin.on('data', c => data += c); process.stdin.on('end', () => process.stdout.write(JSON.parse(data).version));")"
            fi
          fi

          echo "Current version: ${CURRENT_VERSION}"
          echo "Previous version: ${PREVIOUS_VERSION:-<none>}"

          if [[ -z "${PREVIOUS_VERSION}" ]]; then
            echo "should_publish=false" >> "${GITHUB_OUTPUT}"
          elif [[ "${CURRENT_VERSION}" != "${PREVIOUS_VERSION}" ]]; then
            echo "should_publish=true" >> "${GITHUB_OUTPUT}"
          else
            echo "should_publish=false" >> "${GITHUB_OUTPUT}"
          fi

          echo "version=${CURRENT_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${CURRENT_VERSION}" >> "${GITHUB_OUTPUT}"

  publish:
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.should_publish == 'true'
    permissions:
      contents: write
      packages: write
      id-token: write
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
      TAG: ${{ needs.check-version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Update submodules to latest
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --remote

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish to npm (OIDC first, token fallback)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          rm -f "${HOME}/.npmrc"

          publish_npm() {
            pnpm publish --no-git-checks --access public --registry https://registry.npmjs.org
          }

          set +e
          OIDC_OUTPUT="$(publish_npm 2>&1)"
          OIDC_EXIT=$?
          set -e

          echo "${OIDC_OUTPUT}"

          if [[ ${OIDC_EXIT} -eq 0 ]]; then
            echo "Published to npm with OIDC trusted publishing."
            exit 0
          fi

          echo "OIDC publish failed. Trying NPM_TOKEN fallback..."

          if [[ -z "${NPM_TOKEN:-}" ]]; then
            echo "::error::OIDC publish failed and NPM_TOKEN is not configured."
            echo "::error::Set up npm Trusted Publisher OR set NPM_TOKEN as a granular token with bypass 2FA."
            exit ${OIDC_EXIT}
          fi

          printf '%s\n' "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "${HOME}/.npmrc"

          set +e
          TOKEN_OUTPUT="$(publish_npm 2>&1)"
          TOKEN_EXIT=$?
          set -e

          echo "${TOKEN_OUTPUT}"

          if [[ ${TOKEN_EXIT} -ne 0 ]]; then
            if [[ "${TOKEN_OUTPUT}" == *"EOTP"* ]]; then
              echo "::error::NPM_TOKEN requires OTP. Use a granular npm token with bypass 2FA, or use npm Trusted Publishing."
            fi
            exit ${TOKEN_EXIT}
          fi

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          printf '%s\n%s\n' \
            "@choewy:registry=https://npm.pkg.github.com" \
            "//npm.pkg.github.com/:_authToken=${GITHUB_TOKEN}" \
            > "${HOME}/.npmrc"

          pnpm publish --no-git-checks --registry https://npm.pkg.github.com

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --tags origin "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists."
          else
            gh release create "${TAG}" --title "${TAG}" --generate-notes
          fi
